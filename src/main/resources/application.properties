spring.application.name=match-service
server.port=${PORT:3003}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:matchservice}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:local_user}
spring.datasource.password=${DB_PASS:local_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db-changelog-master.xml
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:}

pet-service.url=${PET_SERVICE_URL:http://pet-service:3001}
location-service.url=${LOCATION_SERVICE_URL:http://geo-service:3002}

logging.level.com.sanosysalvos=INFO
logging.level.org.springframework.web=INFO

matching.min-percentage=50
matching.auto-enabled=false
matching.cache.enabled=true
